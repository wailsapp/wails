<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/wails.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/style.css"/>
    <title>Wails App</title>
</head>
<body>
<div class="container">
    <div>
        <a data-wml-openURL="https://wails.io">
            <img src="/wails.png" class="logo" alt="Wails logo"/>
        </a>
        <a data-wml-openURL="https://www.typescriptlang.org/">
            <img src="/typescript.svg" class="logo vanilla" alt="Typescript logo"/>
        </a>
    </div>
    <h1>Wails + Typescript + Desktop Notifications</h1>

    <h3>Authorization</h3>
    <div class="controls">
        <button class="btn" id="request">Request Authorization</button>
        <button class="btn" id="check">Check Authorization</button>
    </div>

    <h3>Quick tests</h3>
    <div class="controls">
        <button class="btn" id="basic">Basic</button>
        <button class="btn" id="complex">Complex (actions + reply)</button>
        <button class="btn" id="thread">Threaded (2 with same threadId)</button>
        <button class="btn" id="schedule">Scheduled (delay 5s)</button>
        <button class="btn" id="update">Update demo (post → 2s → update)</button>
        <button class="btn" id="cancel">Cancel last scheduled</button>
    </div>

    <h3>Custom builder</h3>
    <div class="builder">
        <label>Title <input id="b-title" value="Builder"/></label>
        <label>Body <input id="b-body" value="Built from form values"/></label>
        <label>Subtitle <input id="b-subtitle" value="(macOS / Linux)"/></label>
        <label>ThreadID <input id="b-thread" placeholder="(optional)"/></label>
        <label>Sound
            <select id="b-sound">
                <option value="default">Default</option>
                <option value="silent">Silent</option>
                <option value="named">Named…</option>
            </select>
        </label>
        <label>Sound name <input id="b-sound-name" placeholder="Ping (mac), IM (win), bell (linux)"/></label>
        <label>Interruption
            <select id="b-level">
                <option value="">(default)</option>
                <option value="passive">passive</option>
                <option value="active">active</option>
                <option value="timeSensitive">timeSensitive</option>
                <option value="critical">critical</option>
            </select>
        </label>
        <label>Schedule delay (s, 0 = now) <input id="b-delay" type="number" value="0" min="0"/></label>
        <label class="checkbox"><input id="b-attach" type="checkbox"/> Attach sample image</label>
        <label class="checkbox"><input id="b-actions" type="checkbox"/> Use action category (with reply)</label>
        <div class="controls">
            <button class="btn" id="b-send">Send</button>
            <button class="btn" id="b-update-by-id">Update by last ID</button>
            <button class="btn" id="b-remove">Remove last</button>
        </div>
    </div>

    <div class="status" id="status"></div>
    <div class="footer" id="response"></div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
