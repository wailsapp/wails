<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Wails Setup Wizard</title>
    <!-- Paint a dark (or light) background immediately so there's no white flash
         before the app's CSS/JS load. -->
    <style>
      html { background-color: #0f0f0f; }
      @media (prefers-color-scheme: light) { html { background-color: #f9fafb; } }
    </style>
    <!-- Connect to the font host early. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Load fonts WITHOUT blocking first paint (otherwise the browser shows a
         white page until this external stylesheet downloads). Text renders in a
         fallback first, then swaps to Inter. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
    <!-- Apply the saved/preferred theme class synchronously (Tailwind dark:).
         React re-applies the same class on mount. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('wails-setup-theme');
          var dark = saved ? saved === 'dark'
                           : !window.matchMedia('(prefers-color-scheme: light)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-aVcfP0-R.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DvlgNajO.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
