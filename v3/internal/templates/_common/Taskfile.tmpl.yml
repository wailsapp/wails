version: '3'

vars:
  APP_NAME: "{{.BinaryName}}"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.Opn}}.PACKAGE_MANAGER | default "npm"{{.Cls}}'
  VITE_PORT: '{{.Opn}}.WAILS_VITE_PORT | default 9245{{.Cls}}'
  # Target OS for build/package/run. Defaults to the host OS, and is overridden
  # by `wails3 build GOOS=...` (or the GOOS env var) for cross-compilation. The
  # tasks below dispatch to the matching platform Taskfile via this variable.
  GOOS: '{{.Opn}}.GOOS | default OS{{.Cls}}'

  ## ─── Build Customization ──────────────────────────────────────────────
  ## These variables are NOT overwritten by `wails3 update build-assets`.
  ## All values are additive — empty means no change from platform defaults.
  ## Override via environment: APP_TAGS="extra" task build

  # Tags included in EVERY build (all platforms, all modes)
  APP_TAGS: ''
  # Platform-specific tags (only applied on that platform's builds)
  APP_TAGS_LINUX: ''
  APP_TAGS_DARWIN: ''
  APP_TAGS_WINDOWS: ''
  APP_TAGS_ANDROID: ''
  APP_TAGS_IOS: ''
  APP_TAGS_SERVER: ''
  # Linker flags appended to all builds (e.g. -X main.Version=1.0.0)
  APP_LDFLAGS: ''
  # Override CGO_ENABLED (leave empty to use platform defaults: linux/darwin=1, windows=0)
  APP_CGO_ENABLED: ''

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{.Opn}}.GOOS{{.Cls}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{.Opn}}.GOOS{{.Cls}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{.Opn}}.GOOS{{.Cls}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.Opn}}.VITE_PORT{{.Cls}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker
