version: "3"

includes:
  common: ./Taskfile.yml
  linux: ./linux/Taskfile.yml
  windows: ./windows/Taskfile.yml
  darwin: ./darwin/Taskfile.yml

tasks:
  build:
    summary: Builds the application using Zig for CGO
    cmds:
      - task: '{{.Opn}}if eq OS "windows"{{.Cls}}build:windows{{.Opn}}else if eq OS "darwin"{{.Cls}}build:darwin{{.Opn}}else{{.Cls}}build:linux{{.Opn}}end{{.Cls}}'
        vars:
          ARCH: "{{.Opn}}.ARCH{{.Cls}}"
          DEV: "{{.Opn}}.DEV{{.Cls}}"
          OUTPUT: "{{.Opn}}.OUTPUT{{.Cls}}"
          EXTRA_TAGS: "{{.Opn}}.EXTRA_TAGS{{.Cls}}"
          OBFUSCATED: "{{.Opn}}.OBFUSCATED{{.Cls}}"
          GARBLE_ARGS: "{{.Opn}}.GARBLE_ARGS{{.Cls}}"

  build:linux:
    summary: Builds the application for Linux using Zig
    internal: true
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
          DEV:
            ref: .DEV
      - task: common:generate:icons
      - task: linux:generate:dotdesktop
    preconditions:
      - sh: command -v zig >/dev/null 2>&1
        msg: "Zig compiler not found. Install from https://ziglang.org/download or your package manager."
      - sh: '{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}command -v garble >/dev/null 2>&1{{.Opn}}else{{.Cls}}true{{.Opn}}end{{.Cls}}'
        msg: "garble is required for obfuscated builds. Install it with: go install mvdan.cc/garble@v0.16.0 (requires Go 1.24+). See https://github.com/burrowers/garble/releases for version/toolchain compatibility."
    cmds:
      - '{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}garble {{.Opn}}.GARBLE_ARGS{{.Cls}} build{{.Opn}}else{{.Cls}}go build{{.Opn}}end{{.Cls}} {{.Opn}}.BUILD_FLAGS{{.Cls}} -o {{.Opn}}.OUTPUT{{.Cls}}'
    vars:
      BUILD_FLAGS: '{{.Opn}}if eq .DEV "true"{{.Cls}}{{.Opn}}if or .EXTRA_TAGS (eq .OBFUSCATED "true"){{.Cls}}-tags {{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}wails_obfuscated{{.Opn}}if .EXTRA_TAGS{{.Cls}},{{.Opn}}end{{.Cls}}{{.Opn}}end{{.Cls}}{{.Opn}}.EXTRA_TAGS{{.Cls}} {{.Opn}}end{{.Cls}}-buildvcs=false -gcflags=all="-l"{{.Opn}}else{{.Cls}}-tags production{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}},wails_obfuscated{{.Opn}}end{{.Cls}}{{.Opn}}if .EXTRA_TAGS{{.Cls}},{{.Opn}}.EXTRA_TAGS{{.Cls}}{{.Opn}}end{{.Cls}} -trimpath -buildvcs=false -ldflags="-w -s"{{.Opn}}end{{.Cls}}'
      DEFAULT_OUTPUT: "{{.Opn}}.BIN_DIR{{.Cls}}/{{.Opn}}.APP_NAME{{.Cls}}"
      OUTPUT: "{{.Opn}} .OUTPUT | default .DEFAULT_OUTPUT {{.Cls}}"
    env:
      GOOS: linux
      CGO_ENABLED: 1
      GOARCH: "{{.Opn}}.ARCH | default ARCH{{.Cls}}"
      CC: '{{.Opn}}if eq .ARCH "arm64"{{.Cls}}zig cc -target aarch64-linux-gnu{{.Opn}}else{{.Cls}}zig cc -target x86_64-linux-gnu{{.Opn}}end{{.Cls}}'
      CXX: '{{.Opn}}if eq .ARCH "arm64"{{.Cls}}zig c++ -target aarch64-linux-gnu{{.Opn}}else{{.Cls}}zig c++ -target x86_64-linux-gnu{{.Opn}}end{{.Cls}}'

  build:darwin:
    summary: Builds the application for macOS using Zig
    internal: true
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
          DEV:
            ref: .DEV
      - task: common:generate:icons
    preconditions:
      - sh: command -v zig >/dev/null 2>&1
        msg: "Zig compiler not found. Install from https://ziglang.org/download or your package manager."
      - sh: '{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}command -v garble >/dev/null 2>&1{{.Opn}}else{{.Cls}}true{{.Opn}}end{{.Cls}}'
        msg: "garble is required for obfuscated builds. Install it with: go install mvdan.cc/garble@v0.16.0 (requires Go 1.24+). See https://github.com/burrowers/garble/releases for version/toolchain compatibility."
    cmds:
      - '{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}garble {{.Opn}}.GARBLE_ARGS{{.Cls}} build{{.Opn}}else{{.Cls}}go build{{.Opn}}end{{.Cls}} {{.Opn}}.BUILD_FLAGS{{.Cls}} -o "{{.Opn}}.OUTPUT{{.Cls}}"'
    vars:
      BUILD_FLAGS: '{{.Opn}}if eq .DEV "true"{{.Cls}}{{.Opn}}if or .EXTRA_TAGS (eq .OBFUSCATED "true"){{.Cls}}-tags {{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}wails_obfuscated{{.Opn}}if .EXTRA_TAGS{{.Cls}},{{.Opn}}end{{.Cls}}{{.Opn}}end{{.Cls}}{{.Opn}}.EXTRA_TAGS{{.Cls}} {{.Opn}}end{{.Cls}}-buildvcs=false -gcflags=all="-l"{{.Opn}}else{{.Cls}}-tags production{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}},wails_obfuscated{{.Opn}}end{{.Cls}}{{.Opn}}if .EXTRA_TAGS{{.Cls}},{{.Opn}}.EXTRA_TAGS{{.Cls}}{{.Opn}}end{{.Cls}} -trimpath -buildvcs=false -ldflags="-w -s"{{.Opn}}end{{.Cls}}'
      DEFAULT_OUTPUT: "{{.Opn}}.BIN_DIR{{.Cls}}/{{.Opn}}.APP_NAME{{.Cls}}"
      OUTPUT: "{{.Opn}} .OUTPUT | default .DEFAULT_OUTPUT {{.Cls}}"
    env:
      GOOS: darwin
      CGO_ENABLED: 1
      GOARCH: "{{.Opn}}.ARCH | default ARCH{{.Cls}}"
      CC: '{{.Opn}}if eq .ARCH "arm64"{{.Cls}}zig cc -target aarch64-macos{{.Opn}}else{{.Cls}}zig cc -target x86_64-macos{{.Opn}}end{{.Cls}}'
      CXX: '{{.Opn}}if eq .ARCH "arm64"{{.Cls}}zig c++ -target aarch64-macos{{.Opn}}else{{.Cls}}zig c++ -target x86_64-macos{{.Opn}}end{{.Cls}}'
      MACOSX_DEPLOYMENT_TARGET: "12.0"

  build:windows:
    summary: Builds the application for Windows using Zig
    internal: true
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
          DEV:
            ref: .DEV
      - task: common:generate:icons
    preconditions:
      - sh: command -v zig >/dev/null 2>&1
        msg: "Zig compiler not found. Install from https://ziglang.org/download or your package manager."
      - sh: '{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}command -v garble >/dev/null 2>&1{{.Opn}}else{{.Cls}}true{{.Opn}}end{{.Cls}}'
        msg: "garble is required for obfuscated builds. Install it with: go install mvdan.cc/garble@v0.16.0 (requires Go 1.24+). See https://github.com/burrowers/garble/releases for version/toolchain compatibility."
    cmds:
      - task: windows:generate:syso
        vars:
          ARCH: "{{.Opn}}.ARCH{{.Cls}}"
      - '{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}garble {{.Opn}}.GARBLE_ARGS{{.Cls}} build{{.Opn}}else{{.Cls}}go build{{.Opn}}end{{.Cls}} {{.Opn}}.BUILD_FLAGS{{.Cls}} -o "{{.Opn}}.BIN_DIR{{.Cls}}/{{.Opn}}.APP_NAME{{.Cls}}.exe"'
      - cmd: powershell Remove-item *.syso
        platforms: [windows]
      - cmd: rm -f *.syso
        platforms: [linux, darwin]
    vars:
      BUILD_FLAGS: '{{.Opn}}if eq .DEV "true"{{.Cls}}{{.Opn}}if or .EXTRA_TAGS (eq .OBFUSCATED "true"){{.Cls}}-tags {{.Opn}}if eq .OBFUSCATED "true"{{.Cls}}wails_obfuscated{{.Opn}}if .EXTRA_TAGS{{.Cls}},{{.Opn}}end{{.Cls}}{{.Opn}}end{{.Cls}}{{.Opn}}.EXTRA_TAGS{{.Cls}} {{.Opn}}end{{.Cls}}-buildvcs=false -gcflags=all="-l"{{.Opn}}else{{.Cls}}-tags production{{.Opn}}if eq .OBFUSCATED "true"{{.Cls}},wails_obfuscated{{.Opn}}end{{.Cls}}{{.Opn}}if .EXTRA_TAGS{{.Cls}},{{.Opn}}.EXTRA_TAGS{{.Cls}}{{.Opn}}end{{.Cls}} -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui"{{.Opn}}end{{.Cls}}'
    env:
      GOOS: windows
      CGO_ENABLED: 1
      GOARCH: "{{.Opn}}.ARCH | default ARCH{{.Cls}}"
      CC: '{{.Opn}}if eq .ARCH "arm64"{{.Cls}}zig cc -target aarch64-windows-gnu{{.Opn}}else{{.Cls}}zig cc -target x86_64-windows-gnu{{.Opn}}end{{.Cls}}'
      CXX: '{{.Opn}}if eq .ARCH "arm64"{{.Cls}}zig c++ -target aarch64-windows-gnu{{.Opn}}else{{.Cls}}zig c++ -target x86_64-windows-gnu{{.Opn}}end{{.Cls}}'
