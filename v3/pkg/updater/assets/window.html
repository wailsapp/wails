<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Update Available</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #1d1d1f;
  --fg-dim: #6e6e73;
  --accent: #007aff;
  --accent-fg: #ffffff;
  --surface: #f5f5f7;
  --border: #d2d2d7;
  --error: #d93025;
  --radius: 8px;
  --pad: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1e;
    --fg: #f5f5f7;
    --fg-dim: #98989d;
    --surface: #2c2c2e;
    --border: #3a3a3c;
  }
}
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
}
.wails-updater {
  display: flex;
  flex-direction: column;
  flex: 1;
  padding: var(--pad);
  gap: 12px;
  min-width: 0;
}
.wails-updater__header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.wails-updater__title { font-size: 16px; font-weight: 600; margin: 0; }
.wails-updater__version { color: var(--fg-dim); font-variant-numeric: tabular-nums; font-size: 12px; }
.wails-updater__notes {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 13px;
  line-height: 1.4;
  overflow-y: auto;
  white-space: pre-wrap;
  min-height: 80px;
  max-height: 240px;
}
.wails-updater__progress-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.wails-updater__progress {
  appearance: none;
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border: none;
  border-radius: 3px;
  background: var(--surface);
  overflow: hidden;
}
.wails-updater__progress::-webkit-progress-bar { background: var(--surface); border-radius: 3px; }
.wails-updater__progress::-webkit-progress-value { background: var(--accent); border-radius: 3px; transition: width 100ms linear; }
.wails-updater__progress::-moz-progress-bar { background: var(--accent); border-radius: 3px; }
.wails-updater__status { color: var(--fg-dim); font-size: 12px; min-height: 1.2em; }
.wails-updater__buttons { display: flex; gap: 8px; justify-content: flex-end; }
.wails-updater__btn {
  font: inherit;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  padding: 6px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 120ms ease;
}
.wails-updater__btn:hover:not(:disabled) { background: var(--border); }
.wails-updater__btn:disabled { opacity: 0.5; cursor: default; }
.wails-updater__btn--primary {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: transparent;
}
.wails-updater__btn--primary:hover:not(:disabled) { filter: brightness(0.92); }
.wails-updater__error {
  background: rgba(217, 48, 37, 0.1);
  border: 1px solid var(--error);
  color: var(--error);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  display: none;
}
.wails-updater--error .wails-updater__error { display: block; }
.wails-updater--ready .wails-updater__btn--install { display: none; }
.wails-updater__btn--restart { display: none; }
.wails-updater--ready .wails-updater__btn--restart { display: inline-flex; }
.wails-updater--downloading .wails-updater__btn { display: none; }
.wails-updater--downloading .wails-updater__btn--cancel { display: inline-flex; }
.wails-updater__btn--cancel { display: none; }
</style>
</head>
<body>
<main class="wails-updater" id="root">
  <header class="wails-updater__header">
    <h1 class="wails-updater__title" id="title">Update Available</h1>
    <span class="wails-updater__version" id="version-line">—</span>
  </header>
  <div class="wails-updater__notes" id="notes">Looking for updates&hellip;</div>
  <div class="wails-updater__error" id="error"></div>
  <div class="wails-updater__progress-wrap" id="progress-wrap" hidden>
    <progress class="wails-updater__progress" id="progress" max="100" value="0"></progress>
    <div class="wails-updater__status" id="status"></div>
  </div>
  <footer class="wails-updater__buttons">
    <button class="wails-updater__btn wails-updater__btn--cancel" id="btn-cancel" type="button">Cancel</button>
    <button class="wails-updater__btn wails-updater__btn--remind" id="btn-remind" type="button">Remind Me Later</button>
    <button class="wails-updater__btn wails-updater__btn--skip" id="btn-skip" type="button">Skip This Version</button>
    <button class="wails-updater__btn wails-updater__btn--install wails-updater__btn--primary" id="btn-install" type="button">Install Update</button>
    <button class="wails-updater__btn wails-updater__btn--restart wails-updater__btn--primary" id="btn-restart" type="button">Restart &amp; Apply</button>
  </footer>
</main>
<script type="module">
// The script is intentionally framework-free: it talks to Wails purely
// through the runtime exposed on `window.wails`. This makes the template
// override-friendly — a user can ship their own HTML and pull in the same
// minimal bindings without depending on this file's DOM ids.
const w = (typeof window !== "undefined" && window.wails) ? window.wails : null;

const els = {
  root:       document.getElementById("root"),
  title:      document.getElementById("title"),
  version:    document.getElementById("version-line"),
  notes:      document.getElementById("notes"),
  error:      document.getElementById("error"),
  progressBx: document.getElementById("progress-wrap"),
  progress:   document.getElementById("progress"),
  status:     document.getElementById("status"),
  btnInstall: document.getElementById("btn-install"),
  btnSkip:    document.getElementById("btn-skip"),
  btnRemind:  document.getElementById("btn-remind"),
  btnCancel:  document.getElementById("btn-cancel"),
  btnRestart: document.getElementById("btn-restart"),
};

let currentRelease = null;
let currentVersion = "";

// Wails' event bus dispatches each Emit on a fresh goroutine, so events
// arrive at the frontend out of source-order under load (we have seen e.g.
// installing → verifying → update-ready → download-complete). Rank the
// states monotonically so a late "download-complete" can't downgrade a UI
// that already advanced to "installing". Error short-circuits everything.
const STATE_RANK = {
  "":           0,
  "checking":   1,
  "available":  2,
  "downloading":3,
  "verifying":  4,
  "installing": 5,
  "ready":      6,
};
let currentRank = 0;
let errored = false;

// setState returns true if the transition was accepted. Handlers should
// short-circuit on false so a late event doesn't overwrite text or
// progress UI that has already advanced.
function setState(name) {
  if (!els.root) return false;
  if (name === "error") {
    errored = true;
  } else {
    if (errored) return false;
    const rank = STATE_RANK[name] ?? 0;
    if (rank < currentRank) return false;
    currentRank = rank;
  }
  els.root.classList.remove(
    "wails-updater--checking",
    "wails-updater--available",
    "wails-updater--downloading",
    "wails-updater--verifying",
    "wails-updater--installing",
    "wails-updater--ready",
    "wails-updater--error",
  );
  if (name) els.root.classList.add("wails-updater--" + name);
  return true;
}

function fmt(bytes) {
  if (!bytes || bytes <= 0) return "";
  const k = 1024, units = ["B", "KB", "MB", "GB"];
  const i = Math.min(units.length - 1, Math.floor(Math.log(bytes) / Math.log(k)));
  return (bytes / Math.pow(k, i)).toFixed(i === 0 ? 0 : 1) + " " + units[i];
}

function showError(msg) {
  setState("error");
  if (els.error) {
    els.error.textContent = msg || "Update failed.";
  }
  if (els.progressBx) els.progressBx.hidden = true;
}

function onUpdateAvailable(rel) {
  currentRelease = rel || null;
  if (!setState("available")) return;
  if (els.title) els.title.textContent = "Update Available";
  if (els.version && rel) {
    els.version.textContent =
      (currentVersion ? currentVersion + " → " : "") + (rel.version || "");
  }
  if (els.notes) {
    els.notes.textContent = (rel && rel.notes) ? rel.notes : "No release notes provided.";
  }
}

function onNoUpdate() {
  if (!setState("")) return;
  if (els.title) els.title.textContent = "You're Up to Date";
  if (els.notes) els.notes.textContent = "You're running the latest version.";
  if (els.btnInstall) els.btnInstall.disabled = true;
}

function onDownloadStarted(rel) {
  if (!setState("downloading")) return;
  if (els.progressBx) els.progressBx.hidden = false;
  if (els.progress) { els.progress.removeAttribute("value"); }
  if (els.status) els.status.textContent = "Starting download…";
}

function onDownloadProgress(p) {
  if (!p) return;
  // Only paint progress while we're in the downloading state. A late tick
  // arriving after verifying/installing/ready would otherwise resurrect a
  // misleading progress bar.
  if (currentRank !== STATE_RANK.downloading) return;
  if (els.progress) {
    if (p.total > 0) {
      els.progress.max = p.total;
      els.progress.value = p.written;
    } else {
      els.progress.removeAttribute("value");
    }
  }
  if (els.status) {
    const rate = p.rate ? " · " + fmt(p.rate) + "/s" : "";
    const totalStr = p.total > 0 ? " of " + fmt(p.total) : "";
    els.status.textContent = "Downloaded " + fmt(p.written) + totalStr + rate;
  }
}

function onVerifying() {
  if (!setState("verifying")) return;
  if (els.status) els.status.textContent = "Verifying…";
}

function onInstalling() {
  if (!setState("installing")) return;
  if (els.status) els.status.textContent = "Installing…";
}

function onUpdateReady() {
  if (!setState("ready")) return;
  if (els.status) els.status.textContent = "Update ready — restart to apply.";
}

function onError(info) {
  showError((info && info.message) ? info.message : "Update failed.");
}

function emit(name) {
  if (w && w.Events && typeof w.Events.Emit === "function") {
    w.Events.Emit(name);
  }
}

function on(name, fn) {
  if (w && w.Events && typeof w.Events.On === "function") {
    w.Events.On(name, fn);
  }
}

on("updater:check-started",     () => setState("checking"));
on("updater:update-available",  (e) => onUpdateAvailable(e && (e.data ?? e)));
on("updater:no-update",         onNoUpdate);
on("updater:download-started",  (e) => onDownloadStarted(e && (e.data ?? e)));
on("updater:download-progress", (e) => onDownloadProgress(e && (e.data ?? e)));
on("updater:download-complete", () => {});
on("updater:verifying",         onVerifying);
on("updater:installing",        onInstalling);
on("updater:update-ready",      (e) => onUpdateReady(e && (e.data ?? e)));
on("updater:error",             (e) => onError(e && (e.data ?? e)));

if (els.btnInstall)  els.btnInstall.addEventListener("click",  () => emit("updater:user:install"));
if (els.btnSkip)     els.btnSkip.addEventListener("click",     () => emit("updater:user:skip"));
if (els.btnRemind)   els.btnRemind.addEventListener("click",   () => emit("updater:user:remind"));
if (els.btnCancel)   els.btnCancel.addEventListener("click",   () => emit("updater:user:cancel"));
if (els.btnRestart)  els.btnRestart.addEventListener("click",  () => emit("updater:user:restart"));

// Ask the host to send us the current snapshot so we open in the right state
// whether we just popped because of a periodic-check find or because the
// user triggered CheckAndInstall.
emit("updater:window:ready");
</script>
</body>
</html>
