# File path specific labels (actions/labeler v5 configuration format)
v2-only:
  - changed-files:
      - any-glob-to-any-file:
          - 'v2/**/*'

v3-alpha:
  - changed-files:
      - any-glob-to-any-file:
          - 'v3/**/*'

windows:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*_windows.go'
          - 'v2/internal/frontend/desktop/windows/**/*'

macos:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*_darwin.go'
          - 'v2/internal/frontend/desktop/darwin/**/*'

linux:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*_linux.go'
          - 'v2/internal/frontend/desktop/linux/**/*'

cli:
  - changed-files:
      - any-glob-to-any-file:
          - 'v2/cmd/**/*'
          - 'v3/cmd/**/*'
          - '**/cli/**/*'
          - '**/commands/**/*'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**/*'
          - 'website/**/*'
          - 'mkdocs-website/**/*'

templates:
  - changed-files:
      - any-glob-to-any-file:
          - '**/templates/**/*'
          - '**/template/**/*'

runtime:
  - changed-files:
      - any-glob-to-any-file:
          - '**/runtime/**/*'
          - 'v2/internal/runtime/**/*'
          - 'v3/internal/runtime/**/*'

bindings:
  - changed-files:
      - any-glob-to-any-file:
          - 'v2/internal/binding/**/*'
          - 'v3/internal/generator/**/*'
