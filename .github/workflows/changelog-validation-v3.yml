name: Changelog Validation (v3)

on:
  pull_request:
    branches: [ v3-alpha ]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate (for manual testing)'
        required: true
        type: string

jobs:
  validate-changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.pr_number

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', github.event.inputs.pr_number) }}
        fetch-depth: 0

    - name: Get base ref
      id: pr_info
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "base_ref=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
        else
          echo "base_ref=v3-alpha" >> $GITHUB_OUTPUT
        fi

    - name: Check changelog was updated
      run: |
        git fetch origin ${{ steps.pr_info.outputs.base_ref }}
        if git diff --name-only origin/${{ steps.pr_info.outputs.base_ref }}..HEAD | grep -q "^v3/UNRELEASED_CHANGELOG.md$"; then
          echo "✅ v3/UNRELEASED_CHANGELOG.md updated."
        else
          echo "❌ v3/UNRELEASED_CHANGELOG.md must be updated for all v3 PRs."
          echo "   Add a bullet point describing your changes under the appropriate section."
          exit 1
        fi
