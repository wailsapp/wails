name: Release webview2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v2.1.1 for a patch). Leave empty to auto-bump the minor (v2.X.0).'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # The module is windows-only: 'go test ./...' must run on a windows
  # runner, where the generated marshalling tests actually execute.
  test:
    runs-on: windows-latest
    env:
      GOWORK: "off"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: webview2/go.sum

      - name: Build and test webview2
        working-directory: webview2
        shell: bash
        run: |
          go build ./...
          go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: "webview2/go.sum"

      - name: Determine next version
        id: version
        run: |
          # The module lives at github.com/wailsapp/wails/webview2/v2 and
          # follows a v2.X.0 strategy: every routine release (SDK
          # regeneration, features) bumps MINOR, leaving the patch position
          # free for targeted fixes to an already-released minor. Patch
          # releases are cut by passing an explicit version input.
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            case "$VERSION" in
              v2.*) ;;
              *) echo "::error::version must be v2.X.Y (module path is .../webview2/v2)"; exit 1 ;;
            esac
          else
            LAST_TAG=$(git tag -l "webview2/v2.*" | sort -V | tail -n 1)
            if [ -z "$LAST_TAG" ]; then
              VERSION="v2.0.0"
            else
              LAST_VERSION=${LAST_TAG#webview2/}
              MAJOR=$(echo $LAST_VERSION | cut -d. -f1)
              MINOR=$(echo $LAST_VERSION | cut -d. -f2)
              MINOR=$((MINOR + 1))
              VERSION="${MAJOR}.${MINOR}.0"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing webview2 at version: $VERSION"

      - name: Cross-compile webview2 for Windows
        working-directory: webview2
        run: GOOS=windows go build ./...

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "webview2/${{ steps.version.outputs.version }}" -m "Release webview2 ${{ steps.version.outputs.version }}"
          git push origin "webview2/${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: webview2/${{ steps.version.outputs.version }}
          release_name: webview2 ${{ steps.version.outputs.version }}
          body: |
            Release of webview2 ${{ steps.version.outputs.version }}

            Module path: `github.com/wailsapp/wails/webview2/v2`
            See [webview2/CHANGELOG.md](https://github.com/wailsapp/wails/blob/master/webview2/CHANGELOG.md) for the API delta.
          draft: false
          prerelease: false
          latest: false

      - name: Trigger bump workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: bump-webview2-v3
          client-payload:
            version: ${{ steps.version.outputs.version }}
