name: Build + Test v3

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - v3-alpha
    paths:
      - 'v3/**'
  pull_request_review:
    types: [submitted]
    branches:
      - v3-alpha

jobs:
  test_go:
    name: Run Go Tests v3
    runs-on: ${{ matrix.os }}
    if: github.base_ref == 'v3-alpha'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        go-version: [1.24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config xvfb x11-xserver-utils at-spi2-core xdg-desktop-portal-gtk
          version: 1.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: "v3/go.sum"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Examples
        working-directory: v3
        run: task test:examples

      - name: Run tests (mac)
        if: matrix.os == 'macos-latest'
        env:
          CGO_LDFLAGS: -framework UniformTypeIdentifiers -mmacosx-version-min=10.13
        working-directory: v3
        run: go test -v -timeout 10m ./...

      - name: Run tests (windows)
        if: matrix.os == 'windows-latest'
        working-directory: v3
        run: go test -v -timeout 10m ./...

      - name: Run tests (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        working-directory: v3
        run: dbus-run-session -- xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" go test -v -timeout 10m ./...

      - name: Typecheck binding generator output
        working-directory: v3
        run: task generator:test:check

  test_js:
    name: Run JS Tests
    runs-on: ubuntu-latest
    if: github.base_ref == 'v3-alpha'
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: v2/internal/frontend/runtime/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: v2/internal/frontend/runtime

      - name: Run tests
        run: npm test
        working-directory: v2/internal/frontend/runtime

  test_templates:
    name: Test Templates
    needs: test_go
    runs-on: ${{ matrix.os }}
    if: github.base_ref == 'v3-alpha'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        template:
          - svelte
          - svelte-ts
          - vue
          - vue-ts
          - react
          - react-ts
          - preact
          - preact-ts
          - lit
          - lit-ts
          - vanilla
          - vanilla-ts
        go-version: [1.24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config
          version: 1.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: "v3/go.sum"

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-wails3-templates-${{ hashFiles('v3/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-npm-wails3-templates-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Wails3 CLI
        working-directory: v3
        run: |
          task install
          wails3 doctor

      - name: Generate template '${{ matrix.template }}'
        run: |
          mkdir -p ./test-${{ matrix.template }}
          cd ./test-${{ matrix.template }}
          wails3 init -n ${{ matrix.template }} -t ${{ matrix.template }}
          cd ${{ matrix.template }}
          wails3 build

  build_results:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: v3 Build Results
    needs: [test_go, test_js, test_templates]
    steps:
      - run: |
          go_result="${{ needs.test_go.result }}"
          js_result="${{ needs.test_js.result }}"
          templates_result="${{ needs.test_templates.result }}"

          if [[ $go_result == "success" || $go_result == "skipped" ]] && \
             [[ $js_result == "success" || $js_result == "skipped" ]] && \
             [[ $templates_result == "success" || $templates_result == "skipped" ]]; then
            echo "All required jobs succeeded or were skipped"
            exit 0
          else
            echo "One or more required jobs failed"
            exit 1
          fi
